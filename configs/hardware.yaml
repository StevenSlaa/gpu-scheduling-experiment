hardware:
  gpus:
    - id: gpu0
      device: cuda:0
      memory_gb: 96
    - id: gpu1
      device: cuda:1
      memory_gb: 96

  mig:
    enabled: true  # Hardware MIG enabled on GPU 0 and GPU 1; profile 1g.24gb (4 instances each)
    partitions_per_gpu: 4
    partition_memory_gb: 24
    total_partitions: 8
